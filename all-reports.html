<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Reports — Admin</title>
    <link rel="stylesheet" href="stylesheet.css" />
  </head>
  <body class="dashboard-page all-reports-page">
    <header class="topbar">
      <a href="overview.html" class="topbar__brand topbar__brand--studio">
        CREE<span class="topbar__brand-mark" aria-hidden="true"></span>STUDIOS
      </a>
      <button
        type="button"
        class="topbar__burger"
        id="nav-open"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="nav-overlay"
        aria-haspopup="dialog"
      >
        <span class="topbar__burger-line" aria-hidden="true"></span>
        <span class="topbar__burger-line" aria-hidden="true"></span>
        <span class="topbar__burger-line" aria-hidden="true"></span>
      </button>
    </header>

    <main class="reports-main">
      <p class="all-reports__back">
        <a href="reports.html" class="all-reports__back-link">← Reports</a>
      </p>
      <h1 class="reports-page__title">ALL REPORTS</h1>

      <div class="reports-footer reports-footer--all">
        <button
          type="button"
          class="reports-banned-toggle"
          id="all-reports-banned-toggle"
          aria-pressed="false"
        >
          Show Banned Users
        </button>
      </div>

      <div class="all-reports-grid" id="all-reports-list"></div>
      <p class="reports-section__empty" id="all-reports-empty" hidden>No reports found</p>
    </main>

    <div
      class="modal modal--delete"
      id="all-reports-delete-modal"
      hidden
      role="dialog"
      aria-modal="true"
      aria-labelledby="all-reports-delete-modal-title"
    >
      <div class="modal__backdrop" id="all-reports-delete-modal-backdrop"></div>
      <div class="modal__panel">
        <h2 class="modal__title" id="all-reports-delete-modal-title">Delete report?</h2>
        <p class="modal__text">This report will be removed permanently.</p>
        <div class="modal__actions">
          <button type="button" class="modal__btn modal__btn--ghost" id="all-reports-delete-modal-cancel">
            Cancel
          </button>
          <button type="button" class="modal__btn modal__btn--danger" id="all-reports-delete-modal-confirm">
            Delete
          </button>
        </div>
      </div>
    </div>

    <div id="nav-overlay-container"></div>
    <script src="script.js"></script>
  </body>
</html>
