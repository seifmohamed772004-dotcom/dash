<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Features Management — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="stylesheet.css" />
  </head>
  <body class="fm-page">
    <header class="fm-topbar">
      <a href="overview.html" class="fm-topbar__brand"><img src="Assets/Login Logo.png" alt="CREESTUDIOS" class="brand-logo" /></a>
      <button
        type="button"
        class="fm-topbar__burger"
        id="fm-burger"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="fm-nav-overlay"
      >
        <span class="fm-topbar__burger-line" aria-hidden="true"></span>
        <span class="fm-topbar__burger-line" aria-hidden="true"></span>
        <span class="fm-topbar__burger-line" aria-hidden="true"></span>
      </button>
    </header>

    <div class="fm-wrap">
      <div class="fm-head">
        <div class="fm-head__titles">
          <h1 class="fm-title">Features management</h1>
          <p class="fm-subtitle" id="fm-subtitle">0 total features</p>
        </div>
        <button type="button" class="fm-btn fm-btn--primary" id="fm-btn-add">+ Add feature</button>
      </div>

      <div class="fm-tabs" role="tablist" aria-label="Filter features">
        <button type="button" class="fm-tab is-active" role="tab" data-filter="all" aria-selected="true">All</button>
        <button type="button" class="fm-tab" role="tab" data-filter="active" aria-selected="false">Active</button>
        <button type="button" class="fm-tab" role="tab" data-filter="inactive" aria-selected="false">Inactive</button>
      </div>

      <div class="fm-stats" id="fm-stats">
        <div class="fm-stat">
          <span class="fm-stat__label">Total features</span>
          <span class="fm-stat__val" id="fm-stat-total">0</span>
        </div>
        <div class="fm-stat">
          <span class="fm-stat__label">Active features</span>
          <span class="fm-stat__val" id="fm-stat-active">0</span>
        </div>
        <div class="fm-stat">
          <span class="fm-stat__label">Live / In dev</span>
          <span class="fm-stat__val" id="fm-stat-live-dev">0 / 0</span>
        </div>
        <div class="fm-stat">
          <span class="fm-stat__label">Planned</span>
          <span class="fm-stat__val" id="fm-stat-planned">0</span>
        </div>
      </div>

      <h2 class="fm-section-title">UI/UX</h2>
      <div class="fm-scroll" id="fm-scroll">
        <div class="fm-grid" id="fm-grid"></div>
      </div>
    </div>

    <div id="fm-nav-overlay" class="fm-overlay-nav" hidden aria-hidden="true">
      <div class="fm-overlay-nav__backdrop" data-fm-close-nav></div>
      <div class="fm-overlay-nav__panel">
        <button type="button" class="fm-overlay-nav__close" data-fm-close-nav>Close</button>
        <a href="overview.html" class="fm-overlay-nav__link">Overview</a>
        <a href="posts.html" class="fm-overlay-nav__link">Posts</a>
        <a href="users.html" class="fm-overlay-nav__link">Users</a>
        <a href="media.html" class="fm-overlay-nav__link">Media Library</a>
        <a href="features.html" class="fm-overlay-nav__link">Features</a>
        <a href="settings.html" class="fm-overlay-nav__link">Settings</a>
      </div>
    </div>

    <div id="fm-modal" class="fm-modal-overlay" aria-hidden="true">
      <div class="fm-modal" role="dialog" aria-modal="true" aria-labelledby="fm-modal-title">
        <h2 class="fm-modal__title" id="fm-modal-title">Add feature</h2>
        <form id="fm-form" novalidate>
          <div class="fm-field">
            <label class="fm-field__label" for="fm-f-title">Title</label>
            <input type="text" id="fm-f-title" class="fm-input" name="title" required autocomplete="off" />
            <p class="fm-field__error" id="fm-err-title"></p>
          </div>
          <div class="fm-field">
            <label class="fm-field__label" for="fm-f-desc">Description</label>
            <textarea id="fm-f-desc" class="fm-textarea" name="description" required></textarea>
            <p class="fm-field__error" id="fm-err-desc"></p>
          </div>
          <div class="fm-field">
            <label class="fm-field__label" for="fm-f-cat">Category</label>
            <select id="fm-f-cat" class="fm-select" name="category" required>
              <option value="">Select category</option>
              <option value="UI/UX">UI/UX</option>
              <option value="Backend">Backend</option>
              <option value="Marketing">Marketing</option>
            </select>
            <p class="fm-field__error" id="fm-err-cat"></p>
          </div>
          <div class="fm-field">
            <label class="fm-field__label" for="fm-f-status">Status</label>
            <select id="fm-f-status" class="fm-select" name="status" required>
              <option value="">Select status</option>
              <option value="live">Live</option>
              <option value="dev">In dev</option>
              <option value="planned">Planned</option>
            </select>
            <p class="fm-field__error" id="fm-err-status"></p>
          </div>
          <div class="fm-field">
            <label class="fm-field__label" for="fm-f-author">Author</label>
            <input type="text" id="fm-f-author" class="fm-input" name="author" required autocomplete="name" />
            <p class="fm-field__error" id="fm-err-author"></p>
          </div>
          <div class="fm-modal__actions">
            <button type="button" class="fm-btn fm-btn--ghost" id="fm-btn-cancel">Cancel</button>
            <button type="submit" class="fm-btn fm-btn--primary" id="fm-btn-save">Save</button>
          </div>
        </form>
      </div>
    </div>

    <div id="fm-toast" class="fm-toast" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
