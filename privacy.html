<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privacy Policy — CREESTUDIOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      * {
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      *::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      :root {
        --pp-bg: #0d0d0d;
        --pp-surface: #141414;
        --pp-accent: #5be7c4;
        --pp-text: #ededed;
        --pp-muted: #a1a1a1;
        --pp-border: rgba(255, 255, 255, 0.1);
        --pp-danger: #c45c5c;
        --pp-radius: 12px;
        --pp-radius-sm: 6px;
        --pp-t: 0.25s ease;
        --pp-topbar: 56px;
      }

      html {
        scroll-behavior: smooth;
      }

      body.privacy-page {
        margin: 0;
        min-height: 100%;
        min-height: 100dvh;
        font-family: "Unbounded", system-ui, sans-serif;
        font-size: 15px;
        line-height: 1.55;
        color: var(--pp-text);
        background: var(--pp-bg);
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
      }

      .privacy-topbar {
        position: sticky;
        top: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: var(--pp-topbar);
        padding-inline: 1.25rem;
        border-bottom: 1px solid var(--pp-border);
        background: rgba(13, 13, 13, 0.95);
        -webkit-backdrop-filter: blur(10px);
        backdrop-filter: blur(10px);
      }

      .privacy-topbar__brand {
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: #fff;
        text-decoration: none;
        text-transform: uppercase;
        transition: color var(--pp-t);
      }

      .privacy-topbar__brand:hover {
        color: var(--pp-accent);
      }

      .privacy-topbar__burger {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        width: 2.5rem;
        height: 2.5rem;
        padding: 0;
        border: none;
        border-radius: var(--pp-radius-sm);
        background: transparent;
        color: #fff;
        cursor: pointer;
        transition: background var(--pp-t), color var(--pp-t);
      }

      .privacy-topbar__burger:hover {
        background: rgba(255, 255, 255, 0.06);
        color: var(--pp-accent);
      }

      .privacy-topbar__burger-line {
        display: block;
        height: 2px;
        width: 1.35rem;
        margin-inline: auto;
        background: currentColor;
        border-radius: 1px;
      }

      .privacy-shell {
        flex: 1;
        display: grid;
        grid-template-columns: minmax(220px, 280px) 1fr;
        gap: 0;
        max-width: 1100px;
        width: 100%;
        margin-inline: auto;
        min-height: 0;
      }

      .privacy-sidebar {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        padding: 1.25rem 1rem 2rem 1.25rem;
        border-inline-end: 1px solid var(--pp-border);
        background: rgba(0, 0, 0, 0.2);
      }

      .privacy-sidebar__actions {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .privacy-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.5rem 0.85rem;
        border: 1px solid transparent;
        border-radius: var(--pp-radius-sm);
        font-family: inherit;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform var(--pp-t), background var(--pp-t), color var(--pp-t), border-color var(--pp-t),
          box-shadow var(--pp-t);
      }

      .privacy-btn:hover {
        transform: scale(1.02);
      }

      .privacy-btn:active {
        transform: scale(0.98);
      }

      .privacy-btn--primary {
        color: #0a0a0a;
        background: var(--pp-accent);
        border-color: var(--pp-accent);
      }

      .privacy-btn--primary:hover {
        box-shadow: 0 0 0 2px rgba(91, 231, 196, 0.35);
      }

      .privacy-btn--ghost {
        color: var(--pp-text);
        background: transparent;
        border-color: var(--pp-border);
      }

      .privacy-btn--ghost:hover {
        border-color: var(--pp-accent);
        color: var(--pp-accent);
      }

      .privacy-btn--danger {
        color: #ffb4b4;
        background: rgba(196, 92, 92, 0.12);
        border-color: rgba(196, 92, 92, 0.45);
      }

      .privacy-toc {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
      }

      .privacy-toc__label {
        margin: 0 0 0.35rem;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--pp-muted);
      }

      .privacy-toc__link {
        display: block;
        padding: 0.4rem 0.5rem;
        border-radius: var(--pp-radius-sm);
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--pp-muted);
        text-decoration: none;
        transition: color var(--pp-t), background var(--pp-t);
      }

      .privacy-toc__link:hover {
        color: var(--pp-accent);
        background: rgba(91, 231, 196, 0.08);
      }

      .privacy-main {
        padding: 1.25rem clamp(1rem, 3vw, 2rem) 3rem;
        min-width: 0;
      }

      .privacy-main__title {
        margin: 0 0 1rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--pp-text);
      }

      .privacy-intro {
        margin: 0 0 0.25rem;
        font-size: 0.95rem;
        color: var(--pp-muted);
        line-height: 1.65;
      }

      .privacy-intro--view {
        white-space: pre-wrap;
      }

      .privacy-intro--edit {
        width: 100%;
        min-height: 100px;
        padding: 0.65rem 0.75rem;
        border: 1px solid var(--pp-border);
        border-radius: var(--pp-radius-sm);
        background: #0a0a0a;
        color: var(--pp-text);
        font-family: inherit;
        font-size: 0.88rem;
        line-height: 1.55;
        resize: vertical;
        transition: border-color var(--pp-t), box-shadow var(--pp-t);
      }

      .privacy-intro--edit:focus {
        outline: none;
        border-color: var(--pp-accent);
        box-shadow: 0 0 0 2px rgba(91, 231, 196, 0.12);
      }

      .privacy-sections {
        display: flex;
        flex-direction: column;
        gap: 0;
        margin-top: 2rem;
      }

      .privacy-section {
        border-block-end: 1px solid var(--pp-border);
        padding-block: 1.5rem;
        scroll-margin-top: calc(var(--pp-topbar) + 12px);
      }

      .privacy-section:first-of-type {
        border-top: 1px solid var(--pp-border);
      }

      .privacy-section__title {
        margin: 0 0 0.75rem;
        font-size: 0.95rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--pp-accent);
      }

      .privacy-section__title-input {
        width: 100%;
        padding: 0.5rem 0.65rem;
        margin-bottom: 0.5rem;
        border: 1px solid var(--pp-border);
        border-radius: var(--pp-radius-sm);
        background: #0a0a0a;
        color: var(--pp-text);
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition: border-color var(--pp-t), box-shadow var(--pp-t);
      }

      .privacy-section__title-input:focus {
        outline: none;
        border-color: var(--pp-accent);
        box-shadow: 0 0 0 2px rgba(91, 231, 196, 0.12);
      }

      .privacy-section__body {
        font-size: 0.88rem;
        color: var(--pp-text);
        line-height: 1.65;
      }

      .privacy-section__body p {
        margin: 0 0 0.65rem;
      }

      .privacy-section__body p:last-child {
        margin-bottom: 0;
      }

      .privacy-section__list {
        margin: 0 0 0.65rem;
        padding-left: 1.25rem;
        color: var(--pp-text);
      }

      .privacy-section__list li {
        margin-bottom: 0.35rem;
      }

      .privacy-section__textarea {
        width: 100%;
        min-height: 120px;
        padding: 0.65rem 0.75rem;
        border: 1px solid var(--pp-border);
        border-radius: var(--pp-radius-sm);
        background: #0a0a0a;
        color: var(--pp-text);
        font-family: inherit;
        font-size: 0.88rem;
        line-height: 1.55;
        resize: vertical;
        transition: border-color var(--pp-t), box-shadow var(--pp-t);
      }

      .privacy-section__textarea:focus {
        outline: none;
        border-color: var(--pp-accent);
        box-shadow: 0 0 0 2px rgba(91, 231, 196, 0.12);
      }

      .privacy-section__delete {
        margin-top: 0.75rem;
      }

      .privacy-add-section {
        margin-top: 1.5rem;
      }

      .privacy-toast {
        position: fixed;
        inset-inline-end: 1rem;
        inset-block-end: 1rem;
        z-index: 300;
        padding: 0.65rem 1rem;
        border-radius: var(--pp-radius-sm);
        background: #1e1e1e;
        border: 1px solid var(--pp-border);
        color: var(--pp-accent);
        font-size: 0.78rem;
        font-weight: 600;
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s ease;
      }

      .privacy-toast.is-show {
        opacity: 1;
        transform: translateY(0);
      }

      .privacy-overlay-nav {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        opacity: 0;
        visibility: hidden;
        transition: opacity var(--pp-t), visibility var(--pp-t);
      }

      .privacy-overlay-nav.is-open {
        opacity: 1;
        visibility: visible;
      }

      .privacy-overlay-nav__backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        -webkit-backdrop-filter: blur(8px);
        backdrop-filter: blur(8px);
      }

      .privacy-overlay-nav__panel {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        min-width: min(300px, 100%);
        padding: 1.25rem;
        border-radius: var(--pp-radius);
        background: #121212;
        border: 1px solid var(--pp-border);
      }

      .privacy-overlay-nav__close {
        align-self: flex-end;
        padding: 0.35rem 0.65rem;
        border: 1px solid var(--pp-border);
        border-radius: var(--pp-radius-sm);
        background: transparent;
        color: var(--pp-text);
        font-family: inherit;
        font-size: 0.75rem;
        cursor: pointer;
        transition: border-color var(--pp-t), color var(--pp-t);
      }

      .privacy-overlay-nav__close:hover {
        color: var(--pp-accent);
        border-color: rgba(91, 231, 196, 0.35);
      }

      .privacy-overlay-nav__link {
        padding: 0.5rem 0.75rem;
        border-radius: var(--pp-radius-sm);
        color: var(--pp-muted);
        text-decoration: none;
        font-size: 0.8rem;
        font-weight: 600;
        transition: color var(--pp-t), background var(--pp-t);
      }

      .privacy-overlay-nav__link:hover {
        color: var(--pp-accent);
        background: rgba(255, 255, 255, 0.04);
      }

      @media (max-width: 768px) {
        .privacy-shell {
          grid-template-columns: 1fr;
        }

        .privacy-sidebar {
          border-inline-end: none;
          border-block-end: 1px solid var(--pp-border);
          padding-inline: 1.25rem;
        }

        .privacy-toc {
          flex-direction: row;
          flex-wrap: wrap;
        }

        .privacy-toc__link {
          flex: 1 1 auto;
          min-width: min(140px, 100%);
        }
      }
    </style>
  </head>
  <body class="privacy-page">
    <header class="privacy-topbar">
      <a href="overview.html" class="privacy-topbar__brand">CREESTUDIOS</a>
      <button
        type="button"
        class="privacy-topbar__burger"
        id="privacy-burger"
        aria-label="Open menu"
        aria-expanded="false"
        aria-controls="privacy-nav-overlay"
      >
        <span class="privacy-topbar__burger-line" aria-hidden="true"></span>
        <span class="privacy-topbar__burger-line" aria-hidden="true"></span>
        <span class="privacy-topbar__burger-line" aria-hidden="true"></span>
      </button>
    </header>

    <div class="privacy-shell">
      <aside class="privacy-sidebar">
        <div class="privacy-sidebar__actions">
          <button type="button" class="privacy-btn privacy-btn--ghost" id="privacy-btn-edit">Edit Policies</button>
          <button type="button" class="privacy-btn privacy-btn--primary" id="privacy-btn-save" hidden>
            Save Changes
          </button>
          <button type="button" class="privacy-btn privacy-btn--ghost" id="privacy-btn-cancel" hidden>Cancel</button>
        </div>
        <nav class="privacy-toc" id="privacy-toc" aria-label="Table of contents"></nav>
      </aside>

      <main class="privacy-main">
        <h1 class="privacy-main__title">Privacy Policy</h1>
        <div id="privacy-content"></div>
      </main>
    </div>

    <div id="privacy-nav-overlay" class="privacy-overlay-nav" hidden aria-hidden="true">
      <div class="privacy-overlay-nav__backdrop" data-privacy-close-nav></div>
      <div class="privacy-overlay-nav__panel">
        <button type="button" class="privacy-overlay-nav__close" data-privacy-close-nav>Close</button>
        <a href="overview.html" class="privacy-overlay-nav__link">Overview</a>
        <a href="posts.html" class="privacy-overlay-nav__link">Posts</a>
        <a href="FAQ.html" class="privacy-overlay-nav__link">FAQ</a>
        <a href="privacy.html" class="privacy-overlay-nav__link">Privacy Policy</a>
        <a href="help.html" class="privacy-overlay-nav__link">Help</a>
        <a href="settings.html" class="privacy-overlay-nav__link">Settings</a>
      </div>
    </div>

    <div id="privacy-toast" class="privacy-toast" role="status" aria-live="polite"></div>

    <script>
      (function () {
        "use strict";

        var STORAGE_KEY = "dashboard_privacy";

        var DEFAULT_POLICY = {
          intro:
            "This Privacy Policy describes how we collect, use, and protect your information when you use our dashboard and related services.",
          sections: [
            {
              id: "1",
              title: "01. INFORMATION WE COLLECT",
              content:
                "We collect information you provide directly (such as account details), usage data, and technical information needed to operate the service securely.\n\nExamples include:\n- Account email and name\n- Log and device data\n- Cookies essential to the product",
            },
            {
              id: "2",
              title: "02. HOW WE USE YOUR INFORMATION",
              content:
                "We use the information to provide and improve our services, communicate with you, ensure security, and comply with legal obligations.",
            },
          ],
        };

        var isEditMode = false;
        var snapshot = null;

        function newSectionId() {
          return "p_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
        }

        function loadPolicy() {
          try {
            var raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) {
              savePolicy(JSON.parse(JSON.stringify(DEFAULT_POLICY)));
              return JSON.parse(JSON.stringify(DEFAULT_POLICY));
            }
            var parsed = JSON.parse(raw);
            if (!parsed || typeof parsed !== "object") {
              return JSON.parse(JSON.stringify(DEFAULT_POLICY));
            }
            if (!Array.isArray(parsed.sections)) parsed.sections = [];
            if (typeof parsed.intro !== "string") parsed.intro = DEFAULT_POLICY.intro;
            return parsed;
          } catch (e) {
            return JSON.parse(JSON.stringify(DEFAULT_POLICY));
          }
        }

        function savePolicy(data) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function getSectionAnchorId(id) {
          return "privacy-section-" + String(id).replace(/[^a-zA-Z0-9_-]/g, "-");
        }

        function generateTOC(sections) {
          var nav = document.getElementById("privacy-toc");
          if (!nav) return;
          nav.innerHTML = "";
          var label = document.createElement("p");
          label.className = "privacy-toc__label";
          label.textContent = "Contents";
          nav.appendChild(label);
          sections.forEach(function (sec) {
            var a = document.createElement("a");
            a.className = "privacy-toc__link";
            a.href = "#" + getSectionAnchorId(sec.id);
            a.textContent = sec.title || "Section";
            a.addEventListener("click", function (e) {
              e.preventDefault();
              var el = document.getElementById(getSectionAnchorId(sec.id));
              if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
            });
            nav.appendChild(a);
          });
        }

        function padNum(n) {
          return n < 10 ? "0" + n : String(n);
        }

        function nextNumberedTitle(index) {
          return padNum(index + 1) + ". NEW SECTION";
        }

        function renderSectionBodyView(container, text) {
          container.className = "privacy-section__body";
          var lines = String(text || "").split(/\r?\n/);
          var i = 0;
          while (i < lines.length) {
            var line = lines[i];
            var trimmed = line.trim();
            if (trimmed === "") {
              i++;
              continue;
            }
            var bullet = /^\s*[-*•]\s+(.+)$/.exec(line);
            if (bullet) {
              var ul = document.createElement("ul");
              ul.className = "privacy-section__list";
              while (i < lines.length) {
                var m = /^\s*[-*•]\s+(.+)$/.exec(lines[i]);
                if (!m) break;
                var li = document.createElement("li");
                li.textContent = m[1];
                ul.appendChild(li);
                i++;
              }
              container.appendChild(ul);
            } else {
              var buf = [trimmed];
              i++;
              while (i < lines.length) {
                var L = lines[i];
                if (L.trim() === "") break;
                if (/^\s*[-*•]\s+/.test(L)) break;
                buf.push(L.trim());
                i++;
              }
              var p = document.createElement("p");
              p.textContent = buf.join(" ");
              container.appendChild(p);
            }
          }
          if (!container.children.length && text && String(text).trim()) {
            var fallback = document.createElement("p");
            fallback.textContent = text;
            container.appendChild(fallback);
          }
        }

        function renderViewMode() {
          var data = loadPolicy();
          var wrap = document.getElementById("privacy-content");
          if (!wrap) return;
          wrap.innerHTML = "";

          var intro = document.createElement("p");
          intro.className = "privacy-intro privacy-intro--view";
          intro.textContent = data.intro || "";
          wrap.appendChild(intro);

          var list = document.createElement("div");
          list.className = "privacy-sections";
          data.sections.forEach(function (sec) {
            var block = document.createElement("section");
            block.className = "privacy-section";
            block.id = getSectionAnchorId(sec.id);
            var h = document.createElement("h2");
            h.className = "privacy-section__title";
            h.textContent = sec.title || "";
            var bodyWrap = document.createElement("div");
            renderSectionBodyView(bodyWrap, sec.content || "");
            block.appendChild(h);
            block.appendChild(bodyWrap);
            list.appendChild(block);
          });
          wrap.appendChild(list);

          generateTOC(data.sections);
        }

        function collectEditFormData() {
          var introEl = document.getElementById("privacy-edit-intro");
          var intro = introEl ? introEl.value : "";
          var sections = [];
          document.querySelectorAll("[data-privacy-section]").forEach(function (row) {
            var id = row.getAttribute("data-privacy-section");
            var titleIn = row.querySelector(".privacy-section__title-input");
            var bodyIn = row.querySelector(".privacy-section__textarea");
            sections.push({
              id: id,
              title: titleIn ? titleIn.value.trim() : "",
              content: bodyIn ? bodyIn.value : "",
            });
          });
          return { intro: intro, sections: sections };
        }

        function buildEditSection(sec) {
          var block = document.createElement("div");
          block.className = "privacy-section";
          block.setAttribute("data-privacy-section", sec.id);
          block.id = getSectionAnchorId(sec.id);

          var titleIn = document.createElement("input");
          titleIn.type = "text";
          titleIn.className = "privacy-section__title-input";
          titleIn.placeholder = "Section title";
          titleIn.value = sec.title || "";

          var bodyIn = document.createElement("textarea");
          bodyIn.className = "privacy-section__textarea";
          bodyIn.rows = 6;
          bodyIn.placeholder = "Section content… Use lines starting with - for bullets.";
          bodyIn.value = sec.content || "";

          var delBtn = document.createElement("button");
          delBtn.type = "button";
          delBtn.className = "privacy-btn privacy-btn--danger privacy-section__delete";
          delBtn.textContent = "Delete section";
          delBtn.addEventListener("click", function () {
            deleteSection(sec.id);
          });

          block.appendChild(titleIn);
          block.appendChild(bodyIn);
          block.appendChild(delBtn);
          return block;
        }

        function renderEditMode() {
          var data = loadPolicy();
          var wrap = document.getElementById("privacy-content");
          if (!wrap) return;
          wrap.innerHTML = "";

          var intro = document.createElement("textarea");
          intro.id = "privacy-edit-intro";
          intro.className = "privacy-intro privacy-intro--edit";
          intro.rows = 5;
          intro.placeholder = "Intro paragraph…";
          intro.value = data.intro || "";
          wrap.appendChild(intro);

          var list = document.createElement("div");
          list.className = "privacy-sections";
          data.sections.forEach(function (sec) {
            list.appendChild(buildEditSection(sec));
          });
          wrap.appendChild(list);

          var addWrap = document.createElement("div");
          addWrap.className = "privacy-add-section";
          var addBtn = document.createElement("button");
          addBtn.type = "button";
          addBtn.className = "privacy-btn privacy-btn--ghost";
          addBtn.textContent = "+ Add Section";
          addBtn.addEventListener("click", function () {
            addSection();
          });
          addWrap.appendChild(addBtn);
          wrap.appendChild(addWrap);

          generateTOC(data.sections);
        }

        function addSection() {
          var data = collectEditFormData();
          var n = data.sections.length;
          data.sections.push({
            id: newSectionId(),
            title: nextNumberedTitle(n),
            content: "",
          });
          savePolicy(data);
          renderEditMode();
        }

        function deleteSection(id) {
          if (!window.confirm("Delete this section? This cannot be undone.")) return;
          var data = collectEditFormData();
          data.sections = data.sections.filter(function (s) {
            return s.id !== id;
          });
          savePolicy(data);
          renderEditMode();
        }

        function setModeButtons() {
          var editBtn = document.getElementById("privacy-btn-edit");
          var saveBtn = document.getElementById("privacy-btn-save");
          var cancelBtn = document.getElementById("privacy-btn-cancel");
          if (editBtn) editBtn.hidden = isEditMode;
          if (saveBtn) saveBtn.hidden = !isEditMode;
          if (cancelBtn) cancelBtn.hidden = !isEditMode;
        }

        function enterEditMode() {
          snapshot = JSON.stringify(loadPolicy());
          isEditMode = true;
          setModeButtons();
          renderEditMode();
        }

        function exitEditMode() {
          isEditMode = false;
          setModeButtons();
          renderViewMode();
        }

        function cancelEdit() {
          if (snapshot) {
            try {
              savePolicy(JSON.parse(snapshot));
            } catch (e) {}
          }
          isEditMode = false;
          setModeButtons();
          renderViewMode();
        }

        function saveChanges() {
          var data = collectEditFormData();
          savePolicy(data);
          isEditMode = false;
          setModeButtons();
          renderViewMode();
          showToast("Saved successfully");
        }

        var toastTimer;
        function showToast(msg) {
          var t = document.getElementById("privacy-toast");
          if (!t) return;
          t.textContent = msg;
          t.classList.add("is-show");
          clearTimeout(toastTimer);
          toastTimer = setTimeout(function () {
            t.classList.remove("is-show");
          }, 2400);
        }

        document.getElementById("privacy-btn-edit").addEventListener("click", enterEditMode);
        document.getElementById("privacy-btn-save").addEventListener("click", saveChanges);
        document.getElementById("privacy-btn-cancel").addEventListener("click", cancelEdit);

        var nav = document.getElementById("privacy-nav-overlay");
        var burger = document.getElementById("privacy-burger");
        function openNav() {
          nav.removeAttribute("hidden");
          nav.setAttribute("aria-hidden", "false");
          nav.classList.add("is-open");
          if (burger) burger.setAttribute("aria-expanded", "true");
          document.body.style.overflow = "hidden";
        }
        function closeNav() {
          nav.classList.remove("is-open");
          nav.setAttribute("aria-hidden", "true");
          if (burger) burger.setAttribute("aria-expanded", "false");
          document.body.style.overflow = "";
          setTimeout(function () {
            nav.setAttribute("hidden", "");
          }, 250);
        }
        if (burger) {
          burger.addEventListener("click", function () {
            if (nav.classList.contains("is-open")) closeNav();
            else openNav();
          });
        }
        document.querySelectorAll("[data-privacy-close-nav]").forEach(function (el) {
          el.addEventListener("click", closeNav);
        });

        renderViewMode();
        setModeButtons();

        window.PrivacyAdmin = {
          loadPolicy: loadPolicy,
          savePolicy: savePolicy,
          renderViewMode: renderViewMode,
          renderEditMode: renderEditMode,
          addSection: addSection,
          deleteSection: deleteSection,
          generateTOC: generateTOC,
        };
      })();
    </script>
  </body>
</html>
